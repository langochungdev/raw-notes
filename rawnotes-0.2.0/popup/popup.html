<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RawNotes</title>
    <style>
        :root {
            color-scheme: dark;
            font-family: "Segoe UI", Arial, sans-serif;
        }

        body {
            margin: 0;
            padding: 16px;
            background: #111;
            color: #f5f5f5;
            min-width: 240px;
        }

        h1 {
            font-size: 18px;
            margin: 0 0 12px;
        }

        button {
            width: 100%;
            padding: 10px 12px;
            margin-top: 8px;
            border-radius: 10px;
            border: 1px solid #2a2a2a;
            background: #1a1a1a;
            color: #f5f5f5;
            font-size: 14px;
            cursor: pointer;
        }

        @media (hover: hover) {
            button:hover {
                background: #232323;
            }
        }
    </style>
</head>

<body>
    <h1>RawNotes</h1>
    <button id="open-manager">Open Manager</button>
    <button id="open-sidepanel">Open Notes</button>
    <script src="popup.js"></script>
</body>

</html>
