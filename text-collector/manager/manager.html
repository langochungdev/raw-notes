<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RawNotes Manager</title>
    <link rel="stylesheet" href="manager.css" />
</head>

<body>
    <div class="app">
        <header class="topbar">
            <div class="search-field">
                <span class="search-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24">
                        <circle cx="11" cy="11" r="7" fill="none" stroke="currentColor" stroke-width="2" />
                        <path d="M16.5 16.5L21 21" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                    </svg>
                </span>
                <input id="search" type="search" placeholder="Search all items" />
            </div>
            <div class="search-collector-filter">
                <button id="search-collectors-toggle" type="button" class="outline-button" aria-expanded="false">
                    All collectors
                </button>
                <div id="search-collectors-panel" class="search-collector-panel hidden" role="listbox" aria-multiselectable="true"></div>
            </div>
            <div class="topbar-actions">
                <button id="manual-entry-toggle" type="button" class="action-button">
                    <span class="button-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24">
                            <path d="M12 5v14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                            <path d="M5 12h14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                        </svg>
                    </span>
                    Manual entry
                </button>
            </div>
        </header>
        <div id="onboard-banner" class="onboard-banner hidden">
            <div class="onboard-text">Welcome to RawNotes — pick folders to enable disk sync and vault integration.</div>
            <div class="onboard-actions">
                <button id="onboard-pick-collectors">Pick Collectors Folder</button>
                <button id="onboard-pick-vault">Pick Vault</button>
                <button id="onboard-done">Skip</button>
            </div>
        </div>
        <main class="layout">
            <aside class="collectors">
                <div class="sidebar-header">
                    <input id="new-collector-name" class="collector-input" type="text" placeholder="Collector name" />
                    <button id="new-collector" type="button" class="icon-action" title="New collector">
                        <span aria-hidden="true">+</span>
                    </button>
                </div>
                <div class="collector-select-bar">
                    <button id="collector-select-toggle" type="button" class="outline-button">Select</button>
                    <button id="collector-delete-selected" type="button" class="icon-action hidden" title="Delete collectors">
                        <span class="button-icon" aria-hidden="true">
                            <svg viewBox="0 0 24 24">
                                <path d="M4 7h16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                                <path d="M9 7V5h6v2" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                                <path d="M7 7l1 12h8l1-12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                            </svg>
                        </span>
                    </button>
                </div>
                <div id="collector-list" class="collector-list"></div>
                <div class="collector-footer">
                    <div class="collector-footer-row">
                        <button id="import-collector" type="button" class="outline-button">
                            <span class="button-icon" aria-hidden="true">
                                <svg viewBox="0 0 24 24">
                                    <path d="M12 4v10" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                                    <path d="M8 10l4 4 4-4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                                    <path d="M5 20h14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                                </svg>
                            </span>
                            Import
                        </button>
                        <button id="export-collector" type="button" class="outline-button">
                            <span class="button-icon" aria-hidden="true">
                                <svg viewBox="0 0 24 24">
                                    <path d="M12 20V10" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                                    <path d="M8 14l4-4 4 4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                                    <path d="M5 4h14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                                </svg>
                            </span>
                            Export
                        </button>
                    </div>
                    <button id="view-logs" type="button" class="outline-button">
                        <span class="button-icon" aria-hidden="true">
                            <svg viewBox="0 0 24 24">
                                <path d="M4 6h16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                                <path d="M4 12h10" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                                <path d="M4 18h7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                            </svg>
                        </span>
                        View logs
                    </button>
                    <button id="pick-folder" type="button" class="outline-button">
                        <span class="button-icon" aria-hidden="true">
                            <svg viewBox="0 0 24 24">
                                <path d="M12 7v5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                                <path d="M12 16h.01" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                                <circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="2" />
                            </svg>
                        </span>
                        Settings
                    </button>
                </div>
            </aside>
            <section class="items">
                <div class="section-title" id="items-title">Items</div>
                <div id="manual-panel" class="manual-panel hidden">
                    <form id="manual-entry" class="manual-entry">
                        <div class="manual-row">
                            <label class="manual-label" for="entry-text">Text</label>
                            <textarea id="entry-text" rows="3" placeholder="Type or paste text"></textarea>
                        </div>
                        <div class="manual-row">
                            <label class="manual-label" for="entry-note">Note</label>
                            <textarea id="entry-note" rows="2" placeholder="Add a note"></textarea>
                        </div>
                        <div class="manual-grid">
                            <div class="manual-row">
                                <label class="manual-label" for="entry-tags">Tags</label>
                                <input id="entry-tags" type="text" placeholder="tag1, tag2" />
                            </div>
                            <div class="manual-row">
                                <label class="manual-label" for="entry-collector">Collector</label>
                                <select id="entry-collector"></select>
                            </div>
                        </div>
                        <div class="manual-actions">
                            <button id="entry-save" type="submit">Add entry</button>
                        </div>
                    </form>
                </div>
                <div class="items-toolbar">
                    <div class="bulk-left">
                        <label class="select-all">
                            <input id="select-all" type="checkbox" />
                        </label>
                        <div id="items-count" class="items-count">0 items</div>
                    </div>
                    <button id="delete-selected" class="icon-action danger-icon is-hidden" type="button" aria-label="Delete selected" disabled>
                        <span class="button-icon" aria-hidden="true">
                            <svg viewBox="0 0 24 24">
                                <path d="M4 7h16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                                <path d="M9 7V5h6v2" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                                <path d="M7 7l1 12h8l1-12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                            </svg>
                        </span>
                    </button>
                </div>
                <div id="item-list" class="item-list"></div>
                <div class="status-footer">
                    <div class="status-left">
                        <span class="status-dot" aria-hidden="true"></span>
                        <span id="minisearch-status">MiniSearch ready · 0 indexed</span>
                    </div>
                    <div class="status-right">TextCollector v1.0</div>
                </div>
            </section>
        </main>
    </div>
    <div id="log-modal" class="modal hidden">
        <div class="modal-panel">
            <div class="modal-header">
                <div class="modal-title">System Logs</div>
                <div class="modal-actions">
                    <button id="clear-logs">Clear All</button>
                    <button id="copy-logs">Copy All</button>
                    <button id="close-logs">Close</button>
                </div>
            </div>
            <div class="log-filters">
                <button class="log-filter active" data-log-filter="all">All</button>
                <button class="log-filter" data-log-filter="INFO">INFO</button>
                <button class="log-filter" data-log-filter="WARN">WARN</button>
                <button class="log-filter" data-log-filter="ERROR">ERROR</button>
            </div>
            <div id="log-list" class="log-list"></div>
        </div>
    </div>
    <div id="edit-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="edit-title">
        <div class="modal-panel">
            <div class="modal-header">
                <div class="modal-title" id="edit-title">Edit Item</div>
                <div class="modal-actions">
                    <button id="cancel-edit" type="button">Cancel</button>
                    <button id="save-edit" type="button">Save</button>
                </div>
            </div>
            <div id="edit-error" class="edit-error"></div>
            <div class="edit-body">
                <div class="edit-row">
                    <label class="edit-label" for="edit-text">Text</label>
                    <textarea id="edit-text" class="edit-input" rows="4"></textarea>
                </div>
                <div class="edit-row">
                    <label class="edit-label" for="edit-note">Note</label>
                    <textarea id="edit-note" class="edit-input" rows="3"></textarea>
                </div>
                <div class="edit-row">
                    <label class="edit-label" for="edit-tags">Tags</label>
                    <input id="edit-tags" class="edit-input" type="text" placeholder="tag1, tag2" />
                </div>
                <div class="edit-row" id="edit-collector-row">
                    <label class="edit-label" for="edit-collector">Collector</label>
                    <select id="edit-collector" class="edit-input"></select>
                </div>
            </div>
        </div>
    </div>
    <div id="settings-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="settings-title">
        <div class="modal-panel settings-panel">
            <div class="modal-header">
                <div class="modal-title" id="settings-title">Settings</div>
                <div class="modal-actions">
                    <button id="settings-close" type="button">Close</button>
                </div>
            </div>
            <div class="settings-body">
                <div class="settings-section">
                    <div class="settings-section-title">Storage</div>
                    <div class="settings-row">
                        <div class="settings-label">Quick notes folder</div>
                        <div class="settings-field">
                            <div id="settings-collectors-path" class="settings-path">Not set</div>
                            <button id="settings-pick-collectors" type="button">Choose</button>
                        </div>
                    </div>
                </div>
                <div class="settings-section">
                    <div class="settings-section-title">Sidebar open</div>
                    <div class="settings-options">
                        <label class="settings-option">
                            <input type="radio" name="sidebar-open-mode" value="float" />
                            <span>Floating button only</span>
                        </label>
                        <label class="settings-option">
                            <input type="radio" name="sidebar-open-mode" value="shortcut" />
                            <span>Shortcut only</span>
                        </label>
                        <label class="settings-option">
                            <input type="radio" name="sidebar-open-mode" value="both" />
                            <span>Shortcut + button</span>
                        </label>
                    </div>
                    <div class="settings-row">
                        <label class="settings-label" for="settings-shortcut">Shortcut</label>
                        <input id="settings-shortcut" class="settings-input" type="text" placeholder="Press keys" readonly />
                        <div class="settings-help">Focus and press keys to set a shortcut.</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="../vendor/minisearch.min.js"></script>
    <script type="module" src="manager.js"></script>
</body>

</html>
